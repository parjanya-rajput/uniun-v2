name: uniun
description: "UNIUN — decentralized offline-first social and knowledge network on Nostr."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

global_options:
  freezed:freezed:
    runs_before:
      - isar_generator:isar_generator

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  bloc_concurrency: ^0.2.4
  injectable: ^2.3.2
  get_it: ^8.0.0
  freezed_annotation: ^3.0.0
  isar_community: 3.3.2
  isar_community_flutter_libs: 3.3.2
  dartz: ^0.10.1
  path_provider: ^2.0.15
  nostr_core_dart: ^1.0.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  build_runner: ^2.13.0
  freezed: ^3.0.0
  isar_community_generator: 3.3.2
  injectable_generator: ^2.4.1
  json_serializable: ^6.9.0
  flutter_native_splash: ^2.3.10
  flutter_launcher_icons: ^0.14.3

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/splash.png

  android_12:
    image: assets/images/splash.png
    color: "#ffffff"

  ios: true
  ios_content_mode: center

  web: false

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/uniun-logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/uniun-logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
