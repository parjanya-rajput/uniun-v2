<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#319bed",
                "background-light": "#f6f7f8",
                "background-dark": "#101a22",
              },
              fontFamily: {
                "display": ["Inter"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
      </script>
<title>UNIUN - Note Graph</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<header class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
<div class="flex items-center p-4 justify-between max-w-5xl mx-auto w-full">
<button class="flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center mr-10">Note Graph</h2>
</div>
</header>
<main class="flex-1 relative overflow-hidden flex flex-col">
<div class="px-4 py-3 max-w-5xl mx-auto w-full">
<label class="flex flex-col min-w-40 h-11 w-full">
<div class="flex w-full flex-1 items-stretch rounded-xl h-full bg-slate-200/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700">
<div class="text-slate-500 flex items-center justify-center pl-4">
<span class="material-symbols-outlined text-[20px]">search</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden border-none bg-transparent focus:outline-0 focus:ring-0 h-full placeholder:text-slate-500 px-4 pl-2 text-sm font-normal leading-normal" placeholder="Search nodes or tags..." value=""/>
</div>
</label>
</div>
<div class="flex gap-2 p-3 overflow-x-auto no-scrollbar max-w-5xl mx-auto w-full">
<button class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-full bg-primary text-white px-4 text-xs font-semibold">
                All Notes
            </button>
<button class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-full bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 px-4 text-xs font-medium">
                Recent
            </button>
<button class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-full bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 px-4 text-xs font-medium">
                Favorites
            </button>
<button class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-full bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 px-4 text-xs font-medium">
                Project Alpha
            </button>
</div>
<div class="flex-1 relative w-full bg-slate-50 dark:bg-slate-900/50 overflow-hidden cursor-grab active:cursor-grabbing">
<div class="absolute inset-0 opacity-10 dark:opacity-20 pointer-events-none" style="background-image: radial-gradient(#319bed 0.5px, transparent 0.5px); background-size: 24px 24px;">
</div>
<svg class="absolute inset-0 w-full h-full pointer-events-none">
<line stroke="#319bed" stroke-opacity="0.4" stroke-width="2" x1="50%" x2="30%" y1="50%" y2="40%"></line>
<line stroke="#319bed" stroke-opacity="0.4" stroke-width="2" x1="50%" x2="70%" y1="50%" y2="45%"></line>
<line stroke="#319bed" stroke-opacity="0.4" stroke-width="2" x1="50%" x2="55%" y1="50%" y2="70%"></line>
<line stroke="#94a3b8" stroke-opacity="0.3" stroke-width="1" x1="30%" x2="20%" y1="40%" y2="60%"></line>
<line stroke="#94a3b8" stroke-opacity="0.3" stroke-width="1" x1="70%" x2="85%" y1="45%" y2="35%"></line>
<line stroke="#94a3b8" stroke-opacity="0.3" stroke-width="1" x1="70%" x2="80%" y1="45%" y2="65%"></line>
</svg>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-20">
<div class="bg-primary text-white p-3 rounded-xl shadow-xl shadow-primary/20 flex flex-col min-w-[140px] ring-4 ring-primary/20">
<span class="text-[10px] uppercase tracking-wider font-bold opacity-80">Current Note</span>
<span class="text-sm font-bold">Research Principles</span>
<div class="flex gap-1 mt-2">
<span class="h-1.5 w-1.5 rounded-full bg-white/40"></span>
<span class="h-1.5 w-1.5 rounded-full bg-white/40"></span>
</div>
</div>
</div>
<div class="absolute top-[40%] left-[30%] -translate-x-1/2 -translate-y-1/2">
<div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-2 rounded-lg shadow-sm flex flex-col min-w-[100px]">
<span class="text-xs font-semibold">User Personas</span>
<span class="text-[9px] text-slate-500 dark:text-slate-400">Linked 2 days ago</span>
</div>
</div>
<div class="absolute top-[45%] left-[70%] -translate-x-1/2 -translate-y-1/2">
<div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-2 rounded-lg shadow-sm flex flex-col min-w-[100px]">
<span class="text-xs font-semibold">Design Systems</span>
<span class="text-[9px] text-slate-500 dark:text-slate-400">Reference: UI/UX</span>
</div>
</div>
<div class="absolute top-[70%] left-[55%] -translate-x-1/2 -translate-y-1/2">
<div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-2 rounded-lg shadow-sm flex flex-col min-w-[100px]">
<span class="text-xs font-semibold">Mental Models</span>
<span class="text-[9px] text-slate-500 dark:text-slate-400">Psychology depth</span>
</div>
</div>
<div class="absolute top-[60%] left-[20%] -translate-x-1/2 -translate-y-1/2">
<div class="size-3 rounded-full bg-slate-300 dark:bg-slate-600"></div>
</div>
<div class="absolute top-[35%] left-[85%] -translate-x-1/2 -translate-y-1/2">
<div class="size-3 rounded-full bg-slate-300 dark:bg-slate-600"></div>
</div>
<div class="absolute top-[65%] left-[80%] -translate-x-1/2 -translate-y-1/2">
<div class="size-3 rounded-full bg-slate-300 dark:bg-slate-600"></div>
</div>
<div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-2">
<button class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-md p-2 rounded-full shadow-lg border border-slate-200 dark:border-slate-700">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300">add</span>
</button>
<button class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-md p-2 rounded-full shadow-lg border border-slate-200 dark:border-slate-700">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300">remove</span>
</button>
<button class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-md p-2 rounded-full shadow-lg border border-slate-200 dark:border-slate-700">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300">center_focus_strong</span>
</button>
</div>
</div>
</main>
<div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[280px] z-50">
<nav class="flex items-center justify-between gap-2 p-2 rounded-full bg-white/40 dark:bg-slate-900/40 backdrop-blur-xl border border-white/40 dark:border-slate-700/40 shadow-2xl">
<a class="flex-1 flex flex-col items-center justify-center p-2 rounded-full bg-white/80 dark:bg-slate-800/80 shadow-sm text-primary" href="#">
<span class="material-symbols-outlined">hub</span>
</a>
<a class="flex-1 flex flex-col items-center justify-center p-2 rounded-full hover:bg-white/40 dark:hover:bg-slate-800/40 transition-all text-slate-600 dark:text-slate-400" href="#">
<span class="material-symbols-outlined">search</span>
</a>
<a class="flex-1 flex flex-col items-center justify-center p-2 rounded-full hover:bg-white/40 dark:hover:bg-slate-800/40 transition-all text-slate-600 dark:text-slate-400" href="#">
<span class="material-symbols-outlined">settings</span>
</a>
</nav>
</div>
</body></html>
