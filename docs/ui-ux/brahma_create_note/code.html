<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>UNIUN - Create Note</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#319bed",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101a22",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header -->
<header class="sticky top-0 z-10 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
<div class="flex items-center px-4 py-4 justify-between max-w-2xl mx-auto w-full">
<button class="text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 p-2 rounded-full transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Brahma</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
</header>
<main class="flex-1 w-full max-w-2xl mx-auto px-4 py-6">
<!-- Note Input Area -->
<div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
<div class="flex p-4 gap-4">
<div class="shrink-0">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">edit_note</span>
</div>
</div>
<div class="flex-1">
<textarea class="w-full min-h-[160px] bg-transparent border-none focus:ring-0 text-lg placeholder:text-slate-400 p-0 resize-none" placeholder="Write a new note..."></textarea>
</div>
</div>
<!-- Action Bar -->
<div class="flex items-center justify-between px-4 py-3 border-t border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/50">
<div class="flex gap-1">
<button class="p-2 text-slate-500 hover:text-primary hover:bg-primary/10 rounded-lg transition-colors" title="Add Image">
<span class="material-symbols-outlined">image</span>
</button>
<button class="p-2 text-slate-500 hover:text-primary hover:bg-primary/10 rounded-lg transition-colors" title="Tag People">
<span class="material-symbols-outlined">group</span>
</button>
<button class="p-2 text-slate-500 hover:text-primary hover:bg-primary/10 rounded-lg transition-colors" title="Reference Note">
<span class="material-symbols-outlined">link</span>
</button>
</div>
<button class="bg-primary hover:bg-primary/90 text-white px-6 py-2 rounded-full text-sm font-semibold shadow-md shadow-primary/20 transition-all">
                    Create Note
                </button>
</div>
</div>
<!-- Reference Graph Section -->
<div class="mt-8">
<div class="flex items-center justify-between mb-4">
<h2 class="text-sm font-semibold uppercase tracking-wider text-slate-500">Reference Graph Preview</h2>
<span class="material-symbols-outlined text-slate-400 text-sm">hub</span>
</div>
<div class="relative w-full aspect-[16/9] bg-white dark:bg-slate-900 rounded-xl border border-dashed border-slate-300 dark:border-slate-700 flex items-center justify-center overflow-hidden">
<!-- Abstract Graph Visual -->
<div class="absolute inset-0 opacity-20 dark:opacity-10 pointer-events-none" style="background-image: radial-gradient(circle at 2px 2px, currentColor 1px, transparent 0); background-size: 24px 24px;">
</div>
<!-- Simulated Nodes and Lines -->
<svg class="w-full h-full text-primary/40 dark:text-primary/20" viewbox="0 0 400 200">
<line stroke="currentColor" stroke-width="1.5" x1="100" x2="200" y1="100" y2="60"></line>
<line stroke="currentColor" stroke-width="1.5" x1="200" x2="300" y1="60" y2="120"></line>
<line stroke="currentColor" stroke-width="1.5" x1="100" x2="150" y1="100" y2="150"></line>
<line stroke="currentColor" stroke-width="1.5" x1="200" x2="250" y1="60" y2="30"></line>
<circle cx="100" cy="100" fill="currentColor" r="6"></circle>
<circle class="text-primary" cx="200" cy="60" fill="currentColor" r="8"></circle>
<circle cx="300" cy="120" fill="currentColor" r="5"></circle>
<circle cx="150" cy="150" fill="currentColor" r="4"></circle>
<circle cx="250" cy="30" fill="currentColor" r="4"></circle>
</svg>
<div class="absolute bottom-4 right-4 bg-white/90 dark:bg-slate-800/90 backdrop-blur px-3 py-1.5 rounded-lg border border-slate-200 dark:border-slate-700 text-xs font-medium shadow-sm">
                    Interactive Preview
                </div>
</div>
</div>
</main>
<!-- Bottom Navigation (Glassmorphism) -->
<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-2rem)] max-w-md z-50">
<div class="bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl border border-white/20 dark:border-slate-800/50 rounded-full shadow-2xl flex items-center justify-around p-2">
<!-- Vishnu Tab -->
<a class="flex flex-col items-center gap-1 py-2 px-6 text-slate-500 hover:text-slate-900 dark:hover:text-slate-100 transition-all rounded-full" href="#">
<span class="material-symbols-outlined">visibility</span>
<span class="text-[10px] font-medium uppercase tracking-widest">Vishnu</span>
</a>
<!-- Brahma Tab (Active) -->
<a class="flex flex-col items-center gap-1 py-2 px-6 text-primary bg-primary/10 rounded-full transition-all" href="#">
<span class="material-symbols-outlined font-bold">add_circle</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Brahma</span>
</a>
<!-- Shiv Tab -->
<a class="flex flex-col items-center gap-1 py-2 px-6 text-slate-500 hover:text-slate-900 dark:hover:text-slate-100 transition-all rounded-full" href="#">
<span class="material-symbols-outlined">content_cut</span>
<span class="text-[10px] font-medium uppercase tracking-widest">Shiv</span>
</a>
</div>
</nav>
<!-- Background Decoration -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
</div>
</body></html>
