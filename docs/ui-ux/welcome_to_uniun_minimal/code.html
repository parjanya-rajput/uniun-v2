<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .signature-gradient {
            background: linear-gradient(135deg, #005ab6 0%, #1672df 100%);
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>

<body class="bg-white font-body text-on-background antialiased selection:bg-secondary-container">
<!-- TopAppBar suppressed as per Shell Visibility Rule (Transactional/Onboarding Page) -->
<main class="relative min-h-screen flex flex-col items-center justify-center px-8 overflow-hidden bg-white">
<!-- Identity Entry Container -->
<div class="w-full max-w-md flex flex-col items-center z-10">
<!-- Brand Anchor -->
<div class="mb-12">
<h1 class="text-blue-600 font-black tracking-tighter text-4xl mb-2">UNIUN</h1>
</div>
<!-- Content Hero -->
<div class="text-center mb-16 space-y-4">
<h2 class="font-headline text-on-surface font-bold text-3xl md:text-4xl tracking-tight leading-tight">
                    Your notes, your network, your identity.
                </h2>
<div class="w-16 h-1 bg-primary/20 mx-auto rounded-full"></div>
</div>
<!-- Action Stack -->
<div class="w-full space-y-6">
<!-- Primary Action -->
<button class="w-full signature-gradient text-on-primary font-bold py-5 px-8 rounded-xl shadow-[0px_12px_32px_rgba(0,90,182,0.12)] active:scale-95 transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span>Create New Identity</span>
</button>
<!-- Secondary Action (Card Style) -->
<button class="w-full bg-white hover:bg-surface-container-low text-on-surface font-semibold py-5 px-8 rounded-xl border border-outline-variant/30 shadow-[0px_4px_16px_rgba(0,0,0,0.02)] active:scale-95 transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-primary">vpn_key</span>
<span>I Already Have a Key</span>
</button>
</div>
<!-- Footer Link -->
<div class="mt-12">
<a class="text-primary font-medium label-sm flex items-center gap-1 hover:opacity-70 transition-opacity" href="#">
                    Learn how UNIUN works
                    <span class="material-symbols-outlined text-sm">arrow_forward</span>
</a>
</div>
</div>
</main>
<!-- BottomNavBar suppressed as per Shell Visibility Rule (Transactional/Onboarding Page) -->
