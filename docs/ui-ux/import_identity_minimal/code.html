<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #ffffff;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(20px);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-white text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl">
<div class="flex items-center justify-between px-6 py-4 w-full max-w-screen-xl mx-auto">
<button class="text-blue-600 active:scale-95 duration-200 transition-opacity hover:opacity-80">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-blue-600 font-black tracking-tighter text-xl">UNIUN</h1>
<div class="w-6"></div> <!-- Spacer for centering -->
</div>
</header>
<main class="flex-grow flex items-center justify-center px-6 pt-24 pb-12">
<div class="w-full max-w-lg space-y-12">
<!-- Hero Content -->
<div class="text-center space-y-4">
<div class="inline-flex items-center justify-center w-20 h-20 bg-secondary-container/30 rounded-2xl mb-4">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="key">key</span>
</div>
<h2 class="text-[2.75rem] font-black text-on-surface leading-tight tracking-tight">Import Your Identity</h2>
<p class="text-on-surface-variant text-lg leading-relaxed max-w-sm mx-auto">Paste your private key to continue. This key allows you to recover your existing assets and profile.</p>
</div>
<!-- Import Form Container -->
<div class="bg-surface-container-lowest rounded-2xl p-8 shadow-[0px_12px_48px_rgba(0,0,0,0.06)] space-y-8">
<div class="space-y-3">
<div class="flex items-center justify-between px-1">
<label class="text-sm font-bold text-on-surface-variant uppercase tracking-wider">Private Key</label>
<button class="text-primary text-sm font-semibold flex items-center gap-1 hover:opacity-70 transition-opacity active:scale-95">
<span class="material-symbols-outlined text-sm" data-icon="content_paste">content_paste</span>
                        Paste from Clipboard
                    </button>
</div>
<div class="relative group">
<textarea class="w-full bg-surface-container-low border-none rounded-xl p-5 text-on-surface font-mono text-sm placeholder:text-outline focus:ring-1 focus:ring-primary/20 transition-all resize-none" placeholder="Enter your multiline private key here..." rows="5"></textarea>
<!-- Decorative Content Halo -->
<div class="absolute -inset-1 bg-secondary-container/10 rounded-xl blur-xl -z-10 opacity-0 group-focus-within:opacity-100 transition-opacity"></div>
</div>
</div>
<div class="space-y-6">
<button class="w-full h-16 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold text-lg rounded-xl shadow-[0px_8px_24px_rgba(0,90,182,0.25)] hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    Continue
                    <span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</button>
<div class="flex items-center justify-center gap-4 text-outline-variant">
<div class="h-[1px] flex-grow bg-surface-container-highest"></div>
<span class="text-xs font-medium uppercase tracking-widest text-on-surface-variant/60">Secure Import</span>
<div class="h-[1px] flex-grow bg-surface-container-highest"></div>
</div>
<div class="bg-surface-container rounded-xl p-4 flex items-start gap-4">
<div class="bg-white p-2 rounded-lg shadow-sm">
<span class="material-symbols-outlined text-primary text-xl" data-icon="security" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
<p class="text-xs text-on-surface-variant leading-normal">
                        Your private key is processed locally on your device and is never sent to our servers. Keep this key safe and never share it with anyone.
                    </p>
</div>
</div>
</div>
</div>
</main>
